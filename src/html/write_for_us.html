<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Write for Us - inkFlow</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      /* Background Styling */
      body {
        background-color: #f9f9f9;
        font-family: "Arial", sans-serif;
      }

      /* Navbar Styling */
      .navbar {
        background-color: #333;
      }

      .navbar-brand,
      .nav-link {
        color: white !important;
      }

      /* Hero Section */
      .hero-section {
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        color: white;
        padding: 80px 0;
        text-align: center;
      }

      .hero-section h1 {
        font-size: 3rem;
        font-weight: bold;
      }

      .hero-section p {
        font-size: 1.2rem;
      }

      /* Form Styling */
      .write-form {
        background: white;
        box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1);
        padding: 30px;
        border-radius: 12px;
      }

      /* Submit Button */
      .btn-submit {
        background: #00f2fe;
        color: #333;
        font-weight: bold;
        border-radius: 8px;
        transition: all 0.3s;
      }

      .btn-submit:hover {
        background: #4facfe;
        color: white;
      }

      /* Footer Styling */
      footer {
        background-color: #222;
        color: white;
        padding: 30px 0;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="index.html">inkFlow</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="article.html">Articles</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="write_for_us.html"
                >Write for Us</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section">
      <div class="container">
        <h1>Write for inkFlow 🚀</h1>
        <p>
          Do you have a passion for technology? Share your knowledge with the
          world!
        </p>
      </div>
    </section>

    <!-- Write for Us Form Section -->
    <section class="container py-5">
      <h2 class="text-center mb-4">Submit Your Article Idea ✍️</h2>
      <div class="row justify-content-center">
        <div class="col-md-8">
          <form class="write-form">
            <div class="mb-3">
              <label for="name" class="form-label">Your Name</label>
              <input
                type="text"
                class="form-control"
                id="name"
                placeholder="Enter your full name"
                required
              />
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email Address</label>
              <input
                type="email"
                class="form-control"
                id="email"
                placeholder="Enter your email"
                required
              />
            </div>
            <div class="mb-3">
              <label for="topic" class="form-label">Article Topic</label>
              <input
                type="text"
                class="form-control"
                id="topic"
                placeholder="Proposed topic for your blog post"
                required
              />
            </div>
            <div class="mb-3">
              <label for="message" class="form-label"
                >Why Should We Publish This?</label
              >
              <textarea
                class="form-control"
                id="message"
                rows="5"
                placeholder="Tell us why your article idea matters"
                required
              ></textarea>
            </div>
            <button type="submit" class="btn btn-submit w-100">
              Submit Your Idea 🚀
            </button>
          </form>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer>
      <p>© 2025 inkFlow Blog. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
